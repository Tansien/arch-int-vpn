name: build-qbittorrent-portcheck

on:
  workflow_dispatch:
    inputs:
      upstream_image:
        description: Upstream binhex image to extend
        required: false
        default: binhex/arch-qbittorrentvpn:latest
      custom_image:
        description: Custom image tag to publish
        required: false
        default: ghcr.io/tansien/qbittorrentvpn-portcheck:latest
  push:
    branches:
      - master
    paths:
      - Dockerfile.qbittorrent-portcheck
      - patches/libtorrent-openssl-dh.patch
      - patches/qbittorrent-webapi-stability.patch
      - run/local/tools.sh
      - .github/workflows/build-qbittorrent-portcheck.yml
  schedule:
    - cron: '17 4 * * *'

permissions:
  contents: read
  packages: write

env:
  DEFAULT_CUSTOM_IMAGE: ghcr.io/tansien/qbittorrentvpn-portcheck:latest
  DEFAULT_UPSTREAM_IMAGE: binhex/arch-qbittorrentvpn:latest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image names
        id: images
        shell: bash
        run: |
          upstream_image="${{ github.event.inputs.upstream_image }}"
          custom_image="${{ github.event.inputs.custom_image }}"
          : "${upstream_image:=${DEFAULT_UPSTREAM_IMAGE}}"
          : "${custom_image:=${DEFAULT_CUSTOM_IMAGE}}"
          echo "upstream_image=${upstream_image}" >> "${GITHUB_OUTPUT}"
          echo "custom_image=${custom_image}" >> "${GITHUB_OUTPUT}"
      - name: Check upstream digest
        id: upstream
        shell: bash
        run: |
          upstream_digest="$(docker buildx imagetools inspect "${{ steps.images.outputs.upstream_image }}" --raw | jq -r '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest')"
          built_from_digest="$(docker buildx imagetools inspect "${{ steps.images.outputs.custom_image }}" --format '{{ index .Image.Config.Labels "io.tansien.upstream.digest" }}' 2>/dev/null || true)"

          echo "digest=${upstream_digest}" >> "${GITHUB_OUTPUT}"

          if [[ "${{ github.event_name }}" == "schedule" && "${upstream_digest}" == "${built_from_digest}" ]]; then
            echo "build=false" >> "${GITHUB_OUTPUT}"
            echo "Upstream unchanged (${upstream_digest}); skipping build."
          else
            echo "build=true" >> "${GITHUB_OUTPUT}"
          fi
      - uses: docker/build-push-action@v6
        if: steps.upstream.outputs.build == 'true'
        with:
          context: .
          file: Dockerfile.qbittorrent-portcheck
          platforms: linux/amd64
          pull: true
          push: true
          build-args: |
            UPSTREAM_IMAGE=${{ steps.images.outputs.upstream_image }}
            UPSTREAM_IMAGE_DIGEST=${{ steps.upstream.outputs.digest }}
          tags: ${{ steps.images.outputs.custom_image }}
